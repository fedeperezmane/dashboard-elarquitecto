<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Constructor de HIITs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0A;--bg2:#141414;--bg3:#1C1C1C;--border:#252525;--border2:#333;--acc:#CBFF00;--acc-txt:#0A0A0A;--txt:#FFFFFF;--txt2:#888;--txt3:#444;--r:10px;--r2:8px;--r3:6px;}
.lm{--bg:#F0F0EB;--bg2:#FFFFFF;--bg3:#E8E8E3;--border:#DDDDD8;--border2:#C8C8C3;--acc:#1A1A1A;--acc-txt:#CBFF00;--txt:#0A0A0A;--txt2:#666;--txt3:#AAA;}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;font-size:14px;transition:background .25s,color .25s}
button{cursor:pointer;border:none;font-family:inherit;transition:all .15s}
input,select{font-family:inherit;transition:all .15s}
input:focus,select:focus{outline:none}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
.hdr-brand{padding:10px 16px 10px 0;border-right:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{height:36px;width:36px;object-fit:contain;border-radius:4px}
.hdr-title{font-size:17px;font-weight:900;letter-spacing:-.05em;line-height:1}
.hdr-title span{color:var(--acc)}
.hdr-sub{font-size:9px;color:var(--txt3);font-weight:600;margin-top:2px}
.hdr-tabs{display:flex;gap:2px;padding:0 12px;flex:1}
.tab-btn{padding:9px 16px;border-radius:var(--r3);background:transparent;color:var(--txt2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.tab-btn.act{background:var(--acc);color:var(--acc-txt)}
.hdr-right{display:flex;align-items:center;gap:6px;padding-left:12px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:var(--r3);background:var(--bg3);border:1px solid var(--border);color:var(--txt2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none}
.icon-btn:hover{border-color:var(--border2);color:var(--txt)}
.main{flex:1;padding:20px;max-width:960px;width:100%;margin:0 auto}
.btn-acc{padding:10px 20px;background:var(--acc);color:var(--acc-txt);border-radius:var(--r2);font-size:13px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.btn-acc:hover{opacity:.85}
.btn-sm{padding:7px 14px;background:var(--bg3);color:var(--txt2);border-radius:var(--r2);font-size:12px;font-weight:600;border:1px solid var(--border)}
.btn-sm:hover{border-color:var(--border2);color:var(--txt)}
.btn-danger{padding:6px 10px;background:transparent;color:var(--txt3);border-radius:var(--r3);font-size:12px;border:1px solid var(--border)}
.btn-danger:hover{background:#FF444420;color:#EF4444;border-color:#EF4444}
.teams-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.team-chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:12px;font-weight:700}
.team-chip.act{border-color:var(--acc);color:var(--acc);background:var(--bg2)}
.team-add-btn{padding:7px 14px;border-radius:20px;border:1px dashed var(--border2);background:transparent;color:var(--txt3);font-size:12px;font-weight:700}
.team-add-btn:hover{border-color:var(--acc);color:var(--acc)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.sec-title{font-size:22px;font-weight:900;letter-spacing:-.04em}
.sec-sub{color:var(--txt2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.player-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.player-info{flex:1 1 140px}
.player-name{font-size:15px;font-weight:700}
.player-pos{font-size:11px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.metrics-row{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.metric{text-align:center;min-width:40px}
.metric-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);margin-bottom:2px}
.metric-val{font-size:14px;font-weight:800}
.player-acts{display:flex;gap:6px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:900;letter-spacing:-.03em}
.modal-x{background:var(--bg3);border:1px solid var(--border);color:var(--txt2);width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center}
.fld{margin-bottom:12px}
.fld-lbl{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2);margin-bottom:5px}
.fld-inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);color:var(--txt);font-size:14px}
.fld-inp:focus{border-color:var(--acc)}
.fld-err{color:#EF4444;font-size:11px;margin-top:3px}
.sub-box{background:var(--bg3);border-radius:var(--r2);padding:14px;margin-bottom:12px}
.sub-box-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.computed{font-size:11px;color:var(--txt2);margin-top:6px}
.computed strong{font-size:18px;font-weight:900}
.session-cfg{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.session-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);white-space:nowrap}
.surf-badges{display:flex;gap:6px}
.surf-badge{padding:7px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:12px;font-weight:800;text-transform:uppercase}
.surf-badge.act{border-color:var(--acc);color:var(--acc);background:var(--bg)}
.surf-info{font-size:11px;color:var(--txt3);font-weight:600}
.hiit-step{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px}
.step-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);margin-bottom:10px}
.step-hdr span{color:var(--txt3);margin-right:6px}
.btns-wrap{display:flex;flex-wrap:wrap;gap:6px}
.sel-btn{padding:8px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.sel-btn.act{border-color:currentColor}
.sel-btn:hover{color:var(--txt);border-color:var(--border2)}
.mini-stat{background:var(--bg3);border-radius:var(--r3);padding:8px 12px;text-align:center;min-width:72px}
.mini-stat-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2);margin-bottom:2px}
.mini-stat-val{font-size:16px;font-weight:900;letter-spacing:-.02em}
.intensity-val{font-size:32px;font-weight:900;letter-spacing:-.05em;color:var(--acc)}
.range-inp{width:100%;height:6px;-webkit-appearance:none;appearance:none;border-radius:3px;background:var(--bg3);outline:none}
.range-inp::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);cursor:pointer}
.range-inp::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--acc);border:none;cursor:pointer}
.range-lims{display:flex;justify-content:space-between;color:var(--txt3);font-size:11px;font-weight:700;margin-top:4px}
.campo-inp{padding:12px 16px;border:2px solid var(--border);border-radius:var(--r2);background:var(--bg);color:var(--txt);font-size:28px;font-weight:900;width:110px;text-align:center}
.campo-inp:focus{border-color:var(--acc)}
.campo-presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.campo-pre{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r3);color:var(--txt2);font-size:12px;font-weight:700}
.campo-pre.act{background:var(--acc);color:var(--acc-txt);border-color:var(--acc)}
.calc-btn{width:100%;padding:16px;background:var(--acc);color:var(--acc-txt);border-radius:var(--r);font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin:8px 0}
.calc-btn:disabled{background:var(--bg3);color:var(--txt3);cursor:not-allowed}
.calc-btn:not(:disabled):hover{opacity:.88}
.warn-box{background:#F59E0B15;border:1px solid #F59E0B40;border-radius:var(--r2);padding:12px 16px;color:#F59E0B;font-size:13px;font-weight:600;margin-bottom:12px}
.results-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.prescription{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.presc-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:800}
.group-hdr{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;margin:14px 0 5px;padding:5px 10px;border-radius:var(--r3)}
.res-row{border-radius:var(--r2);padding:12px 14px;margin-bottom:4px;background:var(--bg3)}
.res-inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.res-name{flex:1 1 120px}
.res-pname{font-size:14px;font-weight:700}
.res-ppos{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:1px;opacity:.6}
.big-num{font-size:26px;font-weight:900;letter-spacing:-.05em}
.res-note{font-size:10px;color:var(--txt3);font-weight:600;margin-top:2px}
.no-data-note{color:var(--txt3);font-size:12px;text-align:center;margin-top:12px;font-weight:600}
.share-btn{width:100%;padding:13px;background:var(--bg3);border:1px solid var(--border);color:var(--txt2);border-radius:var(--r);font-size:14px;font-weight:700;margin-top:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.share-btn:hover{border-color:var(--acc);color:var(--acc)}
.share-ok{color:var(--acc);font-size:12px;font-weight:700;text-align:center;margin-top:6px;display:none}
.custom-inp-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.custom-num{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r2);background:var(--bg);color:var(--txt);font-size:16px;font-weight:700;width:80px;text-align:center}
.custom-num:focus{border-color:var(--acc)}
</style>
</head>

function buildShareText(){
  var h=getHiit(),cat=getCat(),vr=getVr();
  if(!h||!cat||!vr)return"";
  var tk=state.hiit.typeKey,variable=state.hiit.variable,pct=state.hiit.pct;
  var campo=state.hiit.campo,groups=state.hiit.groups;
  var tempoMode=state.hiit.tempoMode,tempoDist=state.hiit.tempoDist,tempoRestManual=state.hiit.tempoRestManual;
  var surf=SURF[state.hiit.superficie];
  var players=getActivePlayers();
  var isTempoD=(tk==="TEMPO"&&tempoMode==="dist");
  var isSprint=(h.mode==="sprint");
  var rows=players.map(function(p){
    var baseVal=getBaseVal(p,variable);if(!baseVal)return null;
    var vel=getSpeed(p,variable,pct);if(!vel)return null;
    var primary,sortVal;
    if(isTempoD){
      var dist=+tempoDist||0;if(!dist)return null;
      var sh=campo&&+campo>0?Math.max(1,Math.round(dist/+campo)):1;
      var t=corrTime(dist,vel,sh,surf);
      primary=fmtT(t,true);sortVal=t;
    } else if(isSprint){
      var effV=variable==="ASR"?(p.vam||0)+(p.asr||0)*(pct/100):baseVal*(pct/100);
      var d=corrSprintDist(effV,vr.w,surf);primary=Math.round(d)+"m";sortVal=d;
    } else {
      var sh2=campo&&+campo>0?autoShuttles(vel,vr.w,campo):1;
      var d2=corrDist(vel,vr.w,sh2,surf);primary=Math.round(d2)+"m";sortVal=d2;
    }
    return {name:p.name,primary:primary,sortVal:sortVal};
  }).filter(Boolean);
  var sorted=isTempoD?rows.slice().sort(function(a,b){return a.sortVal-b.sortVal;}):rows.slice().sort(function(a,b){return b.sortVal-a.sortVal;});
  var n=groups;
  var grped=sorted.map(function(p,i){return Object.assign({},p,{grp:Math.floor(i/Math.ceil(sorted.length/n))});});
  var at=state.teams.find(function(t){return t.id===state.activeTeamId;});
  var teamLine=at?((SPORTS[at.sport]?SPORTS[at.sport].name:"")+' - '+at.name+"\n"):"";
  var fmtLine=isTempoD?(tempoDist+"m"):(vr?vr.l:"");
  var txt="HIIT BUILDER - PF 2.0\n"+teamLine;
  txt+="--------------------\n";
  txt+=h.name+" - "+cat.n+"\n";
  txt+=variable+" "+pct+"% - "+fmtLine+" - "+surf.label+"\n";
  if(campo)txt+="Campo: "+campo+"m\n";
  if(isTempoD&&tempoRestManual)txt+="Descanso: "+tempoRestManual+'"\n';
  var series=state.hiit.series,reps=state.hiit.reps,pausaSeries=state.hiit.pausaSeries;
  txt+="Series: "+series+" x "+reps+" reps\n";
  if(series>1)txt+="Pausa entre series: "+Math.floor(pausaSeries/60)+"'"+(pausaSeries%60?String(pausaSeries%60).padStart(2,"0"):"")+'"'+"\n";
  txt+="--------------------\n";
  var lastGrp=-1;
  grped.forEach(function(p){
    if(p.grp!==lastGrp){txt+="\nGRUPO "+(p.grp+1)+"\n";lastGrp=p.grp;}
    var padded=p.name;while(padded.length<18)padded+=" ";
    txt+="  "+padded+p.primary+"\n";
  });
  txt+="\nby Fede Perez Manetti - HIIT Builder";
  return txt;
}
async function shareResults(){
  var txt=buildShareText();if(!txt)return;
  var okEl=document.getElementById("share-ok");
  if(navigator.share){
    try{await navigator.share({title:"HIIT Builder - Pasadas",text:txt});}catch(e){}
  } else {
    try{await navigator.clipboard.writeText(txt);if(okEl){okEl.style.display="block";setTimeout(function(){okEl.style.display="none";},3000);}}catch(e){alert(txt);}
  }
}

var calcVMAX=function(t){return t>0?+(35/t).toFixed(2):0;};
var calcASR=function(vm,vam){return (vm&&vam&&vm>vam)?+(vm-vam).toFixed(2):0;};
function getSurf(){return SURF[state.hiit.superficie]||SURF.pasto;}
function getActivePlayers(){return state.activeTeamId==="all"?state.players:state.players.filter(function(p){return p.teamId===state.activeTeamId;});}
function getTeamPositions(tid){var t=state.teams.find(function(t){return t.id===tid;});return t&&SPORTS[t.sport]?SPORTS[t.sport].pos:[];}
function getIntRange(variable,typeKey){
  if(typeKey==="TEMPO"){
    if(variable==="VMAX")return[60,80];
    if(variable==="VIFT")return[100,125];
    if(variable==="ASR")return[15,45];
    return[130,150];
  }
  var cat=getCat();if(!cat)return[100,100];
  if(variable==="ASR")return[0,100];
  return cat.iw;
}
function getSpeed(p,variable,pct){
  if(variable==="ASR")return((p.vam||0)+(p.asr||0)*(pct/100))/3.6;
  var base=variable==="VMAX"?p.vmax:variable==="VIFT"?p.vift:p.vam;
  return((base||0)*(pct/100))/3.6;
}
function getBaseVal(p,v){return v==="VMAX"?p.vmax:v==="VIFT"?p.vift:p.vam;}
function autoShuttles(vel,t,campo){if(!campo||+campo<=0)return 1;return Math.max(1,Math.round((vel*t)/+campo));}
function corrDist(vel,t,sh,surf){return Math.max(0,vel*(t-surf.salida-(sh-1)*surf.cod));}
function corrTime(dist,vel,sh,surf){return vel<=0?0:(dist/vel)+surf.salida+(sh-1)*surf.cod;}
function sprintDist(vmaxKmh,t){var tau=1.2,v=vmaxKmh/3.6;return Math.max(0,v*(t+tau*Math.exp(-t/tau)-tau));}
function corrSprintDist(vmaxKmh,t,surf){return sprintDist(vmaxKmh,Math.max(0.2,t-surf.salida));}
function fmtT(s,dec){
  if(!s||s<=0)return"--";
  var m=Math.floor(s/60),sc=s%60;
  if(dec){
    var ss=sc.toFixed(1);
    return m>0?(m+"'"+ss.padStart(4,"0")+'"'):(ss+'"');
  }
  var sr=Math.round(sc);
  return m>0?(m+"'"+String(sr).padStart(2,"0")+'"'):(sr+'"');
}
function getHiit(){return state.hiit.typeKey?HIIT_DB[state.hiit.typeKey]:null;}
function getCat(){var h=getHiit();return h?h.cats.find(function(c){return c.id===state.hiit.catId;}):null;}
function getVr(){var c=getCat();if(!c)return null;var all=c.v.concat(state.hiit.customFormats);return all[state.hiit.varIdx]||all[0];}

  var asr=vmax>0?calcASR(vmax,vam):0;
  var viftRaw=parseFloat(document.getElementById("m-vift").value);
  var vift=viftRaw>0?viftRaw:(testId==="30_15"?parseFloat(vamRaw):0);
  var mTeam=document.getElementById("m-team");
  var teamId=mTeam?mTeam.value||null:null;
  var player={id:idx!==null?state.players[idx].id:Date.now().toString(),name:name,position:document.getElementById("m-pos").value,teamId:teamId,vam:vam,vamTest:testId,vamInput:vamRaw,vmax:vmax,vmaxDirect:vmaxDirectRaw||"",vmax10m:vmax10m||"",asr:asr,vift:vift};
  if(idx!==null)state.players[idx]=player;else state.players.push(player);
  saveData();closeModal();renderMain();
}
function deletePlayer(idx){if(!confirm("Eliminar?"))return;state.players.splice(idx,1);saveData();renderMain();}
function closeModal(){document.getElementById("modal-overlay").style.display="none";}

function renderHiit(){
  var tk=state.hiit.typeKey,catId=state.hiit.catId,variable=state.hiit.variable,pct=state.hiit.pct,restPct=state.hiit.restPct;
  var varIdx=state.hiit.varIdx,campo=state.hiit.campo,groups=state.hiit.groups,calc=state.hiit.calc;
  var superficie=state.hiit.superficie,tempoMode=state.hiit.tempoMode,tempoDist=state.hiit.tempoDist;
  var tempoRestManual=state.hiit.tempoRestManual,customFormats=state.hiit.customFormats,showCustomInput=state.hiit.showCustomInput;
  var h=getHiit(),cat=getCat(),vr=getVr(),surf=getSurf();
  var players=getActivePlayers();
  var html='<div class="sec-hdr"><div><div class="sec-title">Calculador</div><div class="sec-sub">'+players.length+' jugador'+(players.length!==1?"es":"")+" activo"+(players.length!==1?"s":"")+"</div></div></div>";
  if(!players.length)html+='<div class="warn-box">Sin jugadores activos — agregalos en la pestana Jugadores.</div>';
  var sb=Object.keys(SURF).map(function(k){var s=SURF[k];return '<button class="surf-badge'+(superficie===k?" act":"")+'" onclick="setSurf(\''+k+'\')">'+s.label+"</button>";}).join("");
  html+='<div class="session-cfg"><div class="session-lbl">Superficie</div><div class="surf-badges">'+sb+'</div><div class="surf-info">Salida: <strong>'+surf.salida+'"</strong> &middot; COD: <strong>'+surf.cod+'"</strong></div></div>';
  var tb=Object.keys(HIIT_DB).map(function(k){var hh=HIIT_DB[k];var a=tk===k;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:"+hh.color+";border-color:"+hh.color+";background:"+hh.color+"18":"")+'" onclick="setHiitType(\''+k+'\')">'+hh.name+"</button>";}).join("");
  html+='<div class="hiit-step"><div class="step-hdr"><span>1</span>Tipo de HIIT</div><div class="btns-wrap">'+tb+"</div></div>";
  if(!h)return html;
  var isT=(tk==="TEMPO");
  var cb=h.cats.map(function(c){var a=catId===c.id;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:"+h.color+";border-color:"+h.color+";background:"+h.color+"18":"")+'" onclick="setHiitCat(\''+c.id+'\')">'+c.n+(isT?"":' <span style="opacity:.4;font-size:10px">'+c.iw[0]+"-"+c.iw[1]+"%</span>")+"</button>";}).join("");
  html+='<div class="hiit-step"><div class="step-hdr"><span>2</span>Categoria</div><div class="btns-wrap">'+cb+"</div></div>";
  if(!cat)return html;
  var vb=h.vars.map(function(v){var a=variable===v;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:#8B5CF6;border-color:#8B5CF6;background:#8B5CF618":"")+'" onclick="setHiitVar(\''+v+'\')">'+v+"</button>";}).join("");
  html+='<div class="hiit-step"><div class="step-hdr"><span>3</span>Variable de programacion</div><div class="btns-wrap">'+vb+"</div></div>";
  var ir=getIntRange(variable,tk);var safeP=Math.min(Math.max(pct,ir[0]),ir[1]);
  html+='<div class="hiit-step"><div class="step-hdr"><span>4</span>Intensidad</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="color:var(--txt2);font-size:13px;font-weight:700">'+variable+": "+ir[0]+"% &rarr; "+ir[1]+'%</div><div class="intensity-val" id="pct-disp">'+safeP+'%</div></div><input type="range" class="range-inp" id="pct-slider" min="'+ir[0]+'" max="'+ir[1]+'" step="1" value="'+safeP+'" oninput="onPctSlide(this.value)"><div class="range-lims"><span>'+ir[0]+'%</span><span>'+ir[1]+"%</span></div></div>";
  if(cat.rest==="activo"&&!isT){var rpb=[50,55,60].map(function(n){var a=restPct===n;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:#22C55E;border-color:#22C55E;background:#22C55E18":"")+'" onclick="setRestPct('+n+')">'+n+"% VAM</button>";}).join("");html+='<div class="hiit-step"><div class="step-hdr"><span>4b</span>Pausa activa</div><div class="btns-wrap">'+rpb+"</div></div>";}
  if(isT){
    var mb=["dist","time"].map(function(m){var a=tempoMode===m;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:#22C55E;border-color:#22C55E;background:#22C55E18":"")+'" onclick="setTempoMode(\''+m+'\')">'+( m==="dist"?"Distancia &rarr; Tiempo":"Tiempo &rarr; Distancia")+"</button>";}).join("");
    html+='<div class="hiit-step"><div class="step-hdr"><span>5</span>Modo</div><div class="btns-wrap">'+mb+"</div></div>";
    if(tempoMode==="dist"){
      var dp=[100,200,300,400].map(function(d){return '<button class="campo-pre'+(+tempoDist===d?" act":"")+'" onclick="setTempoDist('+d+')">'+d+"m</button>";}).join("");
      html+='<div class="hiit-step"><div class="step-hdr"><span>6</span>Distancia</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap"><input type="number" class="campo-inp" id="tempo-dist-inp" value="'+tempoDist+'" placeholder="&mdash;" oninput="onTempoDistInput(this.value)"><span style="font-size:16px;font-weight:700;color:var(--txt2)">metros</span></div><div class="campo-presets">'+dp+"</div></div>";
      var sugRest=computeSuggestedRest(players,variable,safeP,+tempoDist,campo,surf);
      html+='<div class="hiit-step"><div class="step-hdr"><span>7</span>Descanso y prescripcion</div><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><input type="number" class="campo-inp" id="tempo-rest-inp" value="'+tempoRestManual+'" placeholder="'+(sugRest||"seg")+'" oninput="onTempoRestInput(this.value)"><span style="font-size:16px;font-weight:700;color:var(--txt2)">seg</span></div><div style="color:var(--txt3);font-size:11px;font-weight:600;margin-top:8px">'+(sugRest?"Sugerido: "+sugRest+'" (tiempo x 3)':"Calcula primero para ver sugerencia")+"</div>"+prescRow()+"</div>";
    } else {html+=renderFormatStep(cat,customFormats,varIdx,showCustomInput,"6");}
    html+=renderCampoStep(campo,"8");html+=renderGroupsStep(groups,"9");
  } else {
    html+=renderFormatStep(cat,customFormats,varIdx,showCustomInput,"5");
    if(h.mode==="dist")html+=renderCampoStep(campo,"6");
    html+=renderGroupsStep(groups,h.mode==="dist"?"7":"6");
  }
  html+='<button class="calc-btn"'+(!players.length?' disabled=""':"")+'  onclick="doCalc()">Calcular</button>';
  if(calc)html+=renderResults(players);
  return html;
}

function prescRow(){
  var series=state.hiit.series,reps=state.hiit.reps,pausaSeries=state.hiit.pausaSeries;
  var ACC="color:var(--acc);border-color:var(--acc);background:rgba(203,255,0,.08)";
  var sb=[1,2,3,4].map(function(n){var a=series===n;return '<button class="sel-btn" style="padding:5px 10px;font-size:11px;'+(a?ACC:"")+'" onclick="setSeries('+n+')">'+n+"</button>";}).join("");
  var rb=[2,3,4,5,6,8,10,12,15].map(function(n){var a=reps===n;return '<button class="sel-btn" style="padding:5px 9px;font-size:11px;'+(a?ACC:"")+'" onclick="setReps('+n+')">'+n+"</button>";}).join("");
  var lbl='<span style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);margin-right:6px;white-space:nowrap">';
  var pausaInp=series>1?('<div style="display:flex;align-items:center;gap:6px">'+lbl+'PAUSA SERIES</span><input type="number" id="pausa-series-inp" value="'+pausaSeries+'" min="10" max="600" style="width:62px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r3);background:var(--bg);color:var(--txt);font-size:13px;font-weight:700;text-align:center" oninput="onPausaInput(this.value)"><span style="font-size:11px;color:var(--txt2)">seg</span></div>'):"";
  return '<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
    +'<div style="display:flex;align-items:center;gap:6px">'+lbl+'SERIES</span><div style="display:flex;gap:3px">'+sb+"</div></div>"
    +'<div style="display:flex;align-items:center;gap:6px">'+lbl+'REPS</span><div style="display:flex;gap:3px;flex-wrap:wrap">'+rb+"</div></div>"
    +pausaInp+"</div>";
}
function renderFormatStep(cat,customFormats,varIdx,showCustomInput,stepN){
  var all=cat.v.concat(customFormats);
  var fb=all.map(function(v,i){var a=varIdx===i;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:#22C55E;border-color:#22C55E;background:#22C55E18":"")+'" onclick="setVarIdx('+i+')">'+v.l+"</button>";}).join("");
  var plus='<button class="sel-btn" style="color:#F59E0B;border-color:#F59E0B" onclick="toggleCustomInput()">+</button>';
  var cf="";
  if(showCustomInput){cf='<div class="custom-inp-row"><input type="number" class="custom-num" id="cw" placeholder="Trabajo" min="1"><span style="font-size:18px;font-weight:700;color:var(--txt2)">:</span><input type="number" class="custom-num" id="cr" placeholder="Descanso" min="1"><span style="color:var(--txt2);font-size:13px">seg</span><button class="btn-acc" style="padding:8px 14px;font-size:12px" onclick="addCustomFormat()">Agregar</button></div>';}
  var vr=all[varIdx]||all[0];
  var ms=vr?'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><div class="mini-stat"><div class="mini-stat-lbl">TRABAJO</div><div class="mini-stat-val">'+vr.w+'"</div></div><div class="mini-stat"><div class="mini-stat-lbl">DESCANSO</div><div class="mini-stat-val">'+vr.r+'"</div></div></div>':"";
  return '<div class="hiit-step"><div class="step-hdr"><span>'+stepN+"</span>Formato y prescripcion</div>"
    +'<div class="btns-wrap">'+fb+plus+"</div>"+cf+ms+prescRow()+"</div>";
}
function renderCampoStep(campo,stepN){
  var cp=[40,50,60,80,100,105].map(function(d){return '<button class="campo-pre'+(+campo===d?" act":"")+'" onclick="setCampo('+d+')">'+d+"m</button>";}).join("");
  return '<div class="hiit-step"><div class="step-hdr"><span>'+stepN+'</span>Largo del campo <span style="font-style:normal;color:var(--txt3);font-size:10px">(largos + COD)</span></div><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap"><input type="number" class="campo-inp" id="campo-inp" value="'+campo+'" placeholder="&mdash;" oninput="onCampoInput(this.value)"><span style="font-size:16px;font-weight:700;color:var(--txt2)">m</span></div><div class="campo-presets">'+cp+"</div></div>";
}
function renderGroupsStep(groups,stepN){
  var gb=[2,3,4,5].map(function(n){var a=groups===n;return '<button class="sel-btn'+(a?" act":"")+'" style="'+(a?"color:#F59E0B;border-color:#F59E0B;background:#F59E0B18":"")+'" onclick="setGroups('+n+')">'+n+" grupos</button>";}).join("");
  return '<div class="hiit-step"><div class="step-hdr"><span>'+stepN+"</span>Grupos</div>"+'<div class="btns-wrap">'+gb+"</div></div>";
}
function computeSuggestedRest(players,variable,pct,dist,campo,surf){
  if(!players.length||!dist)return null;
  var valid=players.filter(function(p){return getBaseVal(p,variable)>0;});if(!valid.length)return null;
  var sum=valid.reduce(function(s,p){var vel=getSpeed(p,variable,pct);var sh=campo&&+campo>0?Math.max(1,Math.round(dist/+campo)):1;return s+corrTime(dist,vel,sh,surf);},0);
  return Math.round((sum/valid.length)*3);
}

function renderResults(players){
  var tk=state.hiit.typeKey,variable=state.hiit.variable,pct=state.hiit.pct,restPct=state.hiit.restPct;
  var campo=state.hiit.campo,groups=state.hiit.groups,tempoMode=state.hiit.tempoMode;
  var tempoDist=state.hiit.tempoDist,tempoRestManual=state.hiit.tempoRestManual;
  var h=getHiit(),cat=getCat(),vr=getVr();if(!h||!cat||!vr)return"";
  var surf=getSurf();var isTempoD=(tk==="TEMPO"&&tempoMode==="dist");var isSprint=(h.mode==="sprint");
  var rows=players.map(function(p){
    var baseVal=getBaseVal(p,variable);if(!baseVal||baseVal<=0)return null;
    var vel=getSpeed(p,variable,pct);if(!vel)return null;
    var primary,secondary,sortVal;
    if(isTempoD){
      var dist=+tempoDist||0;if(!dist)return null;
      var sh=campo&&+campo>0?Math.max(1,Math.round(dist/+campo)):1;
      var t=corrTime(dist,vel,sh,surf);primary=fmtT(t,true);sortVal=t;
      var larg=campo&&+campo>0?(" &middot; "+sh+"L"):"";
      var corr=sh>1?("-"+surf.salida+'" sal -'+((sh-1)*surf.cod).toFixed(1)+'" COD'):("-"+surf.salida+'" sal');
      secondary=(vel*3.6).toFixed(1)+" km/h"+larg+" | "+corr;
    } else if(isSprint){
      var effV=variable==="ASR"?(p.vam||0)+(p.asr||0)*(pct/100):baseVal*(pct/100);
      var d=corrSprintDist(effV,vr.w,surf);primary=Math.round(d)+"m";sortVal=d;
      secondary=effV.toFixed(1)+" km/h &middot; "+vr.w+'" | -'+surf.salida+'" sal';
    } else {
      var sh2=campo&&+campo>0?autoShuttles(vel,vr.w,campo):1;
      var d2=corrDist(vel,vr.w,sh2,surf);primary=Math.round(d2)+"m";sortVal=d2;
      var larg2=campo&&+campo>0?(" &middot; "+sh2+"x"+Math.round(d2/sh2)+"m"):"";
      var corr2=sh2>1?("-"+surf.salida+'" sal -'+((sh2-1)*surf.cod).toFixed(1)+'" COD'):("-"+surf.salida+'" sal');
      secondary=(vel*3.6).toFixed(1)+" km/h"+larg2+" | "+corr2;
      if(cat.rest==="activo"){var rs=(p.vam||0)*restPct/100/3.6;var rd=corrDist(rs,vr.r,sh2,surf);secondary+=" | Pausa: "+Math.round(rd)+"m";}
    }
    return {name:p.name,position:p.position,baseVal:baseVal,primary:primary,secondary:secondary,sortVal:sortVal};
  }).filter(Boolean);
  if(!rows.length)return '<div class="results-box"><div class="no-data-note">Ningun jugador tiene datos de "'+variable+'".</div></div>';
  var sorted=isTempoD?rows.slice().sort(function(a,b){return a.sortVal-b.sortVal;}):rows.slice().sort(function(a,b){return b.sortVal-a.sortVal;});
  var n=groups;
  var grped=sorted.map(function(p,i){return Object.assign({},p,{grp:Math.floor(i/Math.ceil(sorted.length/n))});});
  var tags=[[h.name,h.color],[cat.n,"#555"],[variable,"#8B5CF6"],[pct+"%","#F59E0B"]];
  if(isTempoD)tags.push([tempoDist+"m","#22C55E"]);else if(vr)tags.push([vr.l,"#22C55E"]);
  tags.push([surf.label,"#888"]);if(campo)tags.push([campo+"m","#06B6D4"]);
  var tagsHtml=tags.map(function(tg){return '<span class="presc-tag" style="background:'+tg[1]+'20;color:'+tg[1]+'">'+tg[0]+"</span>";}).join("");
  var body="";var lastGrp=-1;
  grped.forEach(function(p){
    if(p.grp!==lastGrp){var gc=GCOLS[p.grp%GCOLS.length];body+='<div class="group-hdr" style="color:'+gc+';background:'+gc+'15">&#9679; GRUPO '+(p.grp+1)+"</div>";lastGrp=p.grp;}
    var gc=GCOLS[p.grp%GCOLS.length];
    body+='<div class="res-row" style="border-left:3px solid '+gc+'"><div class="res-inner"><div class="res-name"><div class="res-pname">'+p.name+"</div>"+(p.position?'<div class="res-ppos">'+p.position+"</div>":"")+'</div><div style="margin-right:8px;text-align:center"><div style="font-size:9px;font-weight:800;text-transform:uppercase;color:var(--txt3)">'+variable+'</div><div style="font-size:13px;font-weight:700">'+p.baseVal+' km/h</div></div><div style="margin-left:auto;text-align:right"><div class="big-num" style="color:'+gc+'">'+p.primary+'</div><div class="res-note">'+p.secondary+"</div></div></div></div>";
  });
  var missing=players.length-rows.length;
  var mn=missing>0?'<div class="no-data-note">'+missing+' jugador'+(missing>1?"es":"")+" sin datos de "+variable+"</div>":"";
  var series=state.hiit.series,reps=state.hiit.reps,pausaSeries=state.hiit.pausaSeries;
  var prescInfo='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">'
    +'<div class="mini-stat"><div class="mini-stat-lbl">SERIES</div><div class="mini-stat-val" style="color:var(--acc)">'+series+'</div></div>'
    +'<div class="mini-stat"><div class="mini-stat-lbl">REPS</div><div class="mini-stat-val" style="color:var(--acc)">'+reps+'</div></div>'
    +(series>1?'<div class="mini-stat"><div class="mini-stat-lbl">PAUSA S.</div><div class="mini-stat-val" style="color:var(--acc)">'+Math.floor(pausaSeries/60)+"'"+(pausaSeries%60?String(pausaSeries%60).padStart(2,"0"):"")+'"</div></div>':"")
    +"</div>";
  var descansoBox=isTempoD&&tempoRestManual?'<div style="margin-bottom:14px;padding:10px 14px;background:var(--bg3);border-radius:var(--r2);font-size:13px;color:var(--txt2)">Descanso: <strong style="color:#22C55E;font-size:18px">'+tempoRestManual+'"</strong></div>':"";
  return '<div class="results-box"><div class="prescription">'+tagsHtml+"</div>"+prescInfo+descansoBox+body+mn+'<button class="share-btn" onclick="shareResults()">&#128228; Compartir trabajo</button><div class="share-ok" id="share-ok">Copiado al portapapeles</div></div>';
}

function onPausaInput(v){state.hiit.pausaSeries=+v||60;state.hiit.calc=false;}
function setSeries(n){state.hiit.series=n;state.hiit.calc=false;renderMain();}
function setReps(n){state.hiit.reps=n;state.hiit.calc=false;renderMain();}
function setSurf(k){state.hiit.superficie=k;state.hiit.calc=false;renderMain();}
function setHiitType(k){var h=HIIT_DB[k];state.hiit=Object.assign({},state.hiit,{typeKey:k,catId:null,variable:h.vars[0],pct:getIntRange(h.vars[0],k)[0],varIdx:0,campo:"",calc:false,tempoMode:"dist",tempoDist:"200",tempoRestManual:"",customFormats:[],showCustomInput:false,series:3,reps:6,pausaSeries:120});renderMain();}
function setHiitCat(id){state.hiit.catId=id;var ir=getIntRange(state.hiit.variable,state.hiit.typeKey);state.hiit.pct=ir[0];state.hiit.varIdx=0;state.hiit.calc=false;renderMain();}
function setHiitVar(v){state.hiit.variable=v;var ir=getIntRange(v,state.hiit.typeKey);state.hiit.pct=ir[0];state.hiit.calc=false;renderMain();}
function onPctSlide(v){state.hiit.pct=+v;state.hiit.calc=false;var el=document.getElementById("pct-disp");if(el)el.textContent=v+"%";}
function setRestPct(n){state.hiit.restPct=n;state.hiit.calc=false;renderMain();}
function setVarIdx(i){state.hiit.varIdx=i;state.hiit.showCustomInput=false;state.hiit.calc=false;renderMain();}
function setCampo(d){state.hiit.campo=String(d);state.hiit.calc=false;var inp=document.getElementById("campo-inp");if(inp)inp.value=d;document.querySelectorAll(".campo-pre").forEach(function(b){b.classList.toggle("act",+b.textContent===d);});}
function onCampoInput(v){state.hiit.campo=v;state.hiit.calc=false;document.querySelectorAll(".campo-pre").forEach(function(b){b.classList.toggle("act",+b.textContent===+v);});}
function setGroups(n){state.hiit.groups=n;state.hiit.calc=false;renderMain();}
function setTempoMode(m){state.hiit.tempoMode=m;state.hiit.calc=false;renderMain();}
function setTempoDist(d){state.hiit.tempoDist=String(d);state.hiit.calc=false;var inp=document.getElementById("tempo-dist-inp");if(inp)inp.value=d;document.querySelectorAll(".campo-pre").forEach(function(b){b.classList.toggle("act",+b.textContent===d);});}
function onTempoDistInput(v){state.hiit.tempoDist=v;state.hiit.calc=false;document.querySelectorAll(".campo-pre").forEach(function(b){b.classList.toggle("act",+b.textContent===+v);});}
function onTempoRestInput(v){state.hiit.tempoRestManual=v;}
function toggleCustomInput(){state.hiit.showCustomInput=!state.hiit.showCustomInput;renderMain();}
function addCustomFormat(){var w=+document.getElementById("cw").value,r=+document.getElementById("cr").value;if(!w||!r||w<=0||r<=0)return;state.hiit.customFormats.push({l:w+":"+r,w:w,r:r,custom:true});state.hiit.varIdx=getCat().v.length+state.hiit.customFormats.length-1;state.hiit.showCustomInput=false;state.hiit.calc=false;renderMain();}
function doCalc(){var ps=document.getElementById("pct-slider");if(ps)state.hiit.pct=+ps.value;var ci=document.getElementById("campo-inp");if(ci)state.hiit.campo=ci.value;var ti=document.getElementById("tempo-dist-inp");if(ti)state.hiit.tempoDist=ti.value;var ri=document.getElementById("tempo-rest-inp");if(ri)state.hiit.tempoRestManual=ri.value;state.hiit.calc=true;renderMain();setTimeout(function(){var r=document.querySelector(".results-box");if(r)r.scrollIntoView({behavior:"smooth",block:"start"});},100);}

applyTheme();
loadData().then(function(){renderMain();});
</script>
</body>
</html>
