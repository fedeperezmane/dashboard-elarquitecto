
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Arquitecto del Futbolista — GPS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>

:root{--lime:#cbff00;--dark:#0a0a0a;--dark3:#1a1a1a;--dark4:#252525;--border:rgba(203,255,0,.13);--text:#fff;--muted:rgba(255,255,255,.5);--dim:rgba(255,255,255,.25);--card:#141414;--card2:#1e1e1e;--red:#ff5555;--green:#55ff99;}
body.light{--dark:#f4f4f4;--dark3:#ebebeb;--dark4:#e0e0e0;--border:rgba(0,0,0,.1);--text:#111;--muted:rgba(0,0,0,.52);--dim:rgba(0,0,0,.35);--card:#fff;--card2:#ececec;--red:#d63031;--green:#00a86b;}
body.light .hdr{box-shadow:0 1px 0 var(--border);}
body.light .sb-item.act{background:#f0ffe0;}
body.light .rel-sw-track{background:rgba(0,0,0,.15);}
body.light .hm-th-sel select option{background:#fff;color:#111;}
body.light ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);}
.theme-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{color:var(--text);border-color:var(--lime);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--dark);z-index:300;gap:12px;}
.hdr-brand{display:flex;align-items:center;gap:14px;}
.hdr-logo{height:38px;}
.hdr-course{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.08em;color:var(--lime);line-height:1.1;}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
.hdr-by{font-size:9px;color:var(--dim);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.tab-btns{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.tbtn{padding:6px 14px;font-size:12px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.tbtn.act{background:var(--lime);color:#0a0a0a;font-weight:600;}
.page{display:none;height:calc(100vh - 68px);}.page.act{display:flex;}
.hm-page{display:none;height:calc(100vh - 68px);overflow-y:auto;padding:20px 24px;}.hm-page.act{display:block;}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;}
.sb-grp{margin-bottom:2px;}
.sb-lbl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:8px 16px 3px;font-weight:600;}
.sb-item{padding:7px 16px;font-size:12.5px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .15s;line-height:1.3;}
.sb-item:hover{color:var(--text);background:var(--card);}
.sb-item.act{color:var(--lime);border-left-color:var(--lime);background:var(--card);font-weight:500;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}
.ctrl-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:flex-end;}
.ctrl-grp{display:flex;flex-direction:column;gap:4px;}
.ctrl-lbl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);font-weight:600;}
.pcheck-wrap{display:flex;gap:6px;flex-wrap:wrap;}
.pcheck{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;user-select:none;}
.pcheck.sel{font-weight:500;color:var(--text);}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rel-wrap{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 10px;}
.rel-wrap select{background:transparent;border:none;color:var(--lime);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;outline:none;}
.rel-wrap select option{background:#141414;color:#fff;}
.rel-wrap span{font-size:11px;color:var(--muted);}
.cat-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.04em;color:var(--lime);}
.cat-n{font-size:11px;color:var(--dim);}
.mg-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.mgtab{padding:4px 11px;border-radius:20px;font-size:11.5px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:'DM Sans',sans-serif;transition:all .15s;}
.mgtab:hover{border-color:var(--lime);color:var(--lime);}
.mgtab.act{background:var(--lime);color:#0a0a0a;border-color:var(--lime);font-weight:600;}
.glegend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:var(--muted);align-items:center;}
.gleg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;display:inline-block;margin-right:4px;}
.gleg-line{width:18px;height:3px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:5px 9px;text-align:right;border-bottom:1px solid var(--border);font-weight:600;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:8px 9px;text-align:right;border-bottom:1px solid rgba(128,128,128,.07);color:var(--text);}
.tbl td:first-child{text-align:left;font-weight:500;}
.tbl tr:hover td{background:var(--card);}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
.td-hi{color:var(--red);font-weight:600;}.td-lo{color:var(--green);font-weight:600;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.sect-lbl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;font-weight:600;}
.empty{text-align:center;padding:50px 20px;color:var(--dim);}
.empty-ico{font-size:40px;margin-bottom:8px;}
.zoom-layout{display:flex;height:100%;}
.zoom-sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;}
.zoom-sec-tabs{display:flex;border-bottom:1px solid var(--border);}
.zoom-stab{flex:1;padding:10px 4px;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;}
.zoom-stab.act{color:var(--lime);border-bottom-color:var(--lime);}
.zoom-sb-list{padding:8px 0;}
.zoom-sb-item{padding:9px 16px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.zoom-sb-item:hover{background:var(--card);}
.zoom-sb-item.act{background:var(--card);border-left-color:var(--lime);}
.zoom-sb-title{font-size:12px;font-weight:500;color:var(--muted);}
.zoom-sb-item.act .zoom-sb-title{color:var(--lime);}
.zoom-sb-sub{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.3;}
.zoom-main{flex:1;overflow-y:auto;padding:20px;}
.zoom-vpanel{width:380px;flex-shrink:0;padding:14px;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.yt-wrap{width:100%;aspect-ratio:16/9;background:var(--dark3);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.yt-wrap iframe{width:100%;height:100%;border:none;}
.yt-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:11px;text-align:center;padding:12px;gap:8px;}
.yt-badge{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--muted);}
.yt-open{display:inline-flex;align-items:center;gap:6px;background:var(--lime);color:#0a0a0a;font-weight:600;font-size:11px;padding:7px 14px;border-radius:6px;text-decoration:none;}
.spec-badge{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 11px;font-size:11px;color:var(--muted);margin-bottom:14px;}

/* HEATMAP */
.hm-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--lime);margin-bottom:4px;}
.hm-sub{font-size:10px;color:var(--dim);margin-bottom:16px;}
.hm-table{width:100%;border-collapse:separate;border-spacing:3px;}
.hm-th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:6px 8px;font-weight:600;text-align:left;}
.hm-th-sel{padding:4px 6px;}
.hm-th-sel select{background:var(--card2);border:1px solid var(--border);color:var(--lime);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:4px 8px;border-radius:5px;cursor:pointer;outline:none;}
.hm-th-sel select option{background:#141414;}
.hm-cat-cell{font-size:11px;font-weight:500;color:var(--muted);padding:6px 10px;white-space:nowrap;}
.hm-card{border-radius:10px;padding:10px 12px;cursor:default;position:relative;min-height:76px;display:flex;flex-direction:column;justify-content:space-between;}
.hm-card-met{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.7;margin-bottom:2px;}
.hm-card-val{font-size:22px;font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;line-height:1;}
.hm-card-u{font-size:10px;font-family:'DM Sans',sans-serif;opacity:.7;margin-left:2px;}
.hm-card-bar-wrap{height:4px;background:rgba(0,0,0,.25);border-radius:2px;margin-top:6px;}
.hm-card-bar{height:4px;border-radius:2px;transition:width .4s;}
.hm-card-tag{font-size:9px;font-weight:600;opacity:.8;margin-top:4px;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(203,255,0,.18);border-radius:2px;}

/* REL SWITCH */
.rel-ctrl{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.rel-switch-wrap{display:flex;align-items:center;gap:6px;}
.rel-sw{position:relative;width:34px;height:18px;cursor:pointer;}
.rel-sw input{opacity:0;width:0;height:0;}
.rel-sw-track{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:9px;transition:.2s;}
.rel-sw input:checked+.rel-sw-track{background:var(--lime);}
.rel-sw-thumb{position:absolute;height:12px;width:12px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;}
.rel-sw input:checked~.rel-sw-thumb{transform:translateX(16px);}
.rel-lbl{font-size:11px;color:var(--muted);min-width:80px;}
.rel-steps{display:none;align-items:center;gap:4px;}
.rel-btn{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--lime);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.rel-btn:hover{background:var(--card2);}
.rel-min{font-size:12px;font-weight:600;color:var(--lime);min-width:20px;text-align:center;}

</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <img src="http://fedeperezmanetti.com/wp-content/uploads/2023/02/LOGO-FEDE-PEREZ-2.png" alt="Logo" class="hdr-logo" onerror="this.style.display='none'">
    <div>
      <div class="hdr-course">El Arquitecto del Futbolista</div>
      <div class="hdr-sub">Herramienta de Análisis GPS</div>
      <div class="hdr-by">by Fede Perez Manetti</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="rel-ctrl">
      <div class="rel-switch-wrap">
        <label class="rel-sw">
          <input type="checkbox" id="relSwitch" onchange="toggleRel()">
          <span class="rel-sw-track"></span>
          <span class="rel-sw-thumb"></span>
        </label>
        <span class="rel-lbl" id="relLabel">Bruto</span>
      </div>
      <div class="rel-steps" id="relSteps">
        <button class="rel-btn" onclick="stepRel(-1)">−</button>
        <span class="rel-min" id="relMinVal">10</span>
        <span style="font-size:10px;color:var(--muted)">min</span>
        <button class="rel-btn" onclick="stepRel(1)">+</button>
      </div>
    </div>
    <div class="tab-btns">
      <button class="tbtn act" onclick="switchPage('analysis')">Análisis</button>
      <button class="tbtn" onclick="switchPage('zoom')">Zoom</button>
      <button class="tbtn" onclick="switchPage('heatmap')">Mapa de calor</button>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
  </div>
</header>

<div class="page act" id="pageAnalysis">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="mainContent"><div class="empty"><div class="empty-ico">⚡</div>Seleccioná una categoría</div></main>
</div>

<div class="page" id="pageZoom">
  <div class="zoom-layout">
    <aside class="zoom-sidebar" id="zoomSb">
      <div class="zoom-sec-tabs">
        <button class="zoom-stab act" data-sec="ssg" onclick="setZoomSec('ssg')">SSG</button>
        <button class="zoom-stab" data-sec="rondos" onclick="setZoomSec('rondos')">Rondos</button>
        <button class="zoom-stab" data-sec="velocidad" onclick="setZoomSec('velocidad')">Vel.</button>
      </div>
      <div class="zoom-sb-list" id="zoomSbList"></div>
    </aside>
    <div class="zoom-main" id="zoomMain"><div class="empty"><div class="empty-ico">🔍</div>Seleccioná un ejercicio</div></div>
    <div class="zoom-vpanel">
      <div class="sect-lbl">Video del entrenamiento</div>
      <div class="yt-wrap" id="ytWrap"><div class="yt-placeholder"><div style="font-size:28px">▶</div><div>Seleccioná un ejercicio</div></div></div>
      <div id="ytInfo"></div>
    </div>
  </div>
</div>

<div class="hm-page" id="pageHeatmap">
  <div class="hm-title">Mapa de predominancia</div>
  <div class="hm-sub">Rojo = máxima demanda · Azul = mínima · Comparación relativa entre tareas</div>
  <div id="hmGrid"></div>
</div>

function parseSSGSpec(spec){
  if(!spec)return null;
  const vsM=spec.match(/(\d+)\s*(?:vs|v)\s*(\d+)/i);
  const dimM=spec.match(/(\d+)\s*m\s*[xX×]\s*(\d+)\s*m/i);
  if(!vsM||!dimM)return null;
  let players=parseInt(vsM[1])+parseInt(vsM[2]);
  if(/arquero/i.test(spec))players+=1;
  const extM=spec.match(/\+\s*(\d+)\s*(?:extremos|comodines)/i);
  if(extM)players+=parseInt(extM[1]);
  const area=parseInt(dimM[1])*parseInt(dimM[2]);
  const m2j=area/players;
  return{players,area,m2j};
}
function getDensCat(m2j){
  if(m2j<100)return'SSG_D_LOW';
  if(m2j<=150)return'SSG_D_MID';
  return'SSG_D_HIGH';
}

function buildDensityRows(){
  const groups={SSG_D_LOW:{},SSG_D_MID:{},SSG_D_HIGH:{}};
  (D.ssgBPS||[]).forEach(row=>{
    const info=SSG_SPEC_DENSITY[row.ESPECIFICACION];
    if(!info)return;
    const cat=info.cat;const p=row.PUESTO;
    if(!groups[cat][p])groups[cat][p]=[];
    groups[cat][p].push(row);
  });
  const result={};
  ['SSG_D_LOW','SSG_D_MID','SSG_D_HIGH'].forEach(cat=>{
    result[cat]={};
    const allRows=Object.values(groups[cat]).flat();
    [...PUESTOS,'TODOS'].forEach(p=>{
      const rows=p==='TODOS'?allRows:(groups[cat][p]||[]);
      if(!rows.length)return;
      const N=rows.reduce((s,r)=>s+(r.N||0),0);
      const DUR=N>0?rows.reduce((s,r)=>s+(r.DURACION||0)*(r.N||0),0)/N:0;
      const vrow={PUESTO:p,CATEGORIA:cat,N,DURACION:DUR};
      D_METRICS.forEach(k=>{
        const valid=rows.filter(r=>r[k]!=null&&!isNaN(r[k]));
        if(!valid.length){vrow[k]=null;return;}
        const wN=valid.reduce((s,r)=>s+(r.N||0),0);
        vrow[k]=wN>0?valid.reduce((s,r)=>s+(r[k]||0)*(r.N||0),0)/wN:null;
      });
      result[cat][p]=vrow;
    });
  });
  return result;
}

function gR(p,c){
  if(RES_CATS&&RES_CATS.has(c)){const d=RES_DATA[c];if(!d)return null;return d.byPC[p]||null;}
  if(DENS_CATS&&DENS_CATS.has(c))return(DENSITY_ROWS[c]||{})[p]||null;
  return D.byPC.find(r=>r.PUESTO===p&&r.CATEGORIA===c);
}
function totN(c){
  if(RES_CATS&&RES_CATS.has(c)){const d=RES_DATA[c];if(!d)return 0;return PUESTOS.reduce((s,p)=>s+((d.byPC[p]||{}).N||0),0);}
  if(DENS_CATS&&DENS_CATS.has(c)){const g=DENSITY_ROWS[c]||{};return PUESTOS.reduce((s,p)=>s+((g[p]||{}).N||0),0);}
  return(D.byPC||[]).filter(r=>r.CATEGORIA===c&&r.PUESTO!=='TODOS').reduce((s,r)=>s+(r.N||0),0);
}
function getRelU(){return relOn?relMin:0;}
function gV(row,m,override){
  if(!row)return null;const v=row[m.k];if(v==null||isNaN(v))return null;
  const u=override!==undefined?override:getRelU();
  if(u>0&&m.vol&&row.DURACION>0)return(v/row.DURACION)*u;
  return v;
}
function fmt(v,d=1){if(v==null||isNaN(v))return'—';return parseFloat(v.toFixed(d)).toLocaleString('es-AR');}
function zS(p,mk,val){const vs=D.zD[p]?.[mk]||[];if(vs.length<3)return 0;const mu=vs.reduce((a,b)=>a+b,0)/vs.length;const sd=Math.sqrt(vs.reduce((a,b)=>a+(b-mu)**2,0)/vs.length);return sd===0?0:(val-mu)/sd;}

    </div>`;
  }
  h+=`<div style="position:relative;width:100%;height:${isRes?'0':'280px'}"${isRes?' hidden':''} ><canvas id="mainChart" role="img" aria-label="Gráfico GPS por puesto"></canvas></div>`;
  el.innerHTML=h;

  if(!isRes)buildChart('mainChart',dps,dps.map(p=>gR(p,curCat)),curMG);
  else{const cv=document.getElementById('mainChart');if(cv)cv.style.display='none';}
}

function buildChart(cid,labels,rows,mgId){
  if(cid==='mainChart'){if(chartMain){chartMain.destroy();chartMain=null;}}
  else{if(chartZoom){chartZoom.destroy();chartZoom=null;}}
  const cv=document.getElementById(cid);if(!cv)return;
  const cfg=CHART_CFG[mgId];
  const isLight=document.body.classList.contains('light');
  const tc=isLight?'rgba(0,0,0,.38)':'rgba(255,255,255,.35)';
  const gc=isLight?'rgba(0,0,0,.07)':'rgba(255,255,255,.07)';
  const lbls=labels.map(p=>p==='TODOS'?'Todos':p[0]+p.slice(1).toLowerCase());
  const baseOpts={responsive:true,maintainAspectRatio:false,animation:{duration:380,easing:'easeOutQuart'},plugins:{legend:{display:false}}};

  // Stacked bars + lines (single or multiple)
  const stDS=cfg.stacks.map(s=>{
    const tl=s.topLabel;
    return{
      label:s.l,type:'bar',
      data:rows.map(r=>r?Math.round((gV(r,s)||0)*10)/10:0),
      backgroundColor:s.bg+'cc',borderColor:'transparent',borderWidth:0,
      borderRadius:{topLeft:5,topRight:5,bottomLeft:0,bottomRight:0},
      borderSkipped:false,stack:'s',yAxisID:'y',
      datalabels:{
        anchor:'center',align:'center',color:'#fff',font:{size:10,weight:'700'},
        formatter:(v,ctx)=>{
          if(tl){const row=rows[ctx.dataIndex];const tv=row?gV(row,tl):null;return tv!=null?parseFloat(tv.toFixed(1)):null;}
          return v>0?Math.round(v):null;
        },
        display:ctx=>ctx.parsed&&ctx.parsed.y>0.5
      }
    };
  });

  // Support both cfg.lines (array) and cfg.line (single)
  const lineArr=cfg.lines||(cfg.line?[cfg.line]:[]);
  const lineDS=lineArr.map((lr,li)=>({
    label:lr.l,type:'line',
    data:rows.map(r=>{if(!r)return null;const v=gV(r,lr);return v!=null?(lr.abs?Math.abs(v):v):null;}),
    yAxisID:lr.yAxisID||'y2',
    borderColor:lr.bc,backgroundColor:'transparent',borderWidth:2.5,
    pointRadius:5,pointBackgroundColor:lr.bc,
    pointBorderColor:isLight?'#fff':'#111',pointBorderWidth:2,tension:0.4,
    datalabels:{
      anchor:'end',align:li===0?'top':'bottom',offset:3,
      color:lr.bc,font:{size:11,weight:'700'},
      formatter:v=>v!=null?parseFloat(v.toFixed(1)):null,display:true
    }
  }));

  // Build extra y axes
  const scalesExtra={};
  lineArr.forEach(lr=>{
    const axId=lr.yAxisID||'y2';
    if(!scalesExtra[axId]){
      const ax={position:'right',grid:{display:false},ticks:{font:{size:10},color:lr.bc},border:{display:false},title:{display:true,text:lr.y2label,font:{size:9},color:lr.bc}};
      if(lr.y2min!=null)ax.min=lr.y2min;
      if(lr.y2max!=null)ax.max=lr.y2max;
      scalesExtra[axId]=ax;
    }
  });

  const ch=new Chart(cv,{type:'bar',data:{labels:lbls,datasets:[...stDS,...lineDS]},options:{...baseOpts,
    scales:{
      x:{stacked:true,ticks:{font:{size:10},color:tc},grid:{display:false},border:{display:false}},
      y:{stacked:true,ticks:{font:{size:10},color:tc,callback:v=>v>=1000?Math.round(v/100)/10+'k':v},grid:{color:gc,lineWidth:1},border:{display:false},grace:'15%'},
      ...scalesExtra,
    },layout:{padding:{top:36}}
  }});
  if(cid==='mainChart')chartMain=ch;else chartZoom=ch;
}

// ZOOM
window.setZoomSec=function(sec){zSec=sec;zIdx=null;document.querySelectorAll('.zoom-stab').forEach(el=>el.classList.toggle('act',el.dataset.sec===sec));buildZoomList();document.getElementById('zoomMain').innerHTML='<div class="empty"><div class="empty-ico">🔍</div>Seleccioná un ejercicio</div>';setYT(null);};

function buildZoomList(){
  const el=document.getElementById('zoomSbList');let h='';
  if(zSec==='ssg'){
    // Toggle density/ejercicio
    h+=`<div style="display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border)">
      <button style="flex:1;padding:4px 0;border-radius:5px;border:1px solid var(--border);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;${ssgViewMode==='ejercicio'?'background:var(--lime);color:#0a0a0a;font-weight:600':'background:transparent;color:var(--muted)'}" onclick="ssgViewMode='ejercicio';buildZoomList()">Por ejercicio</button>
      <button style="flex:1;padding:4px 0;border-radius:5px;border:1px solid var(--border);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;${ssgViewMode==='densidad'?'background:var(--lime);color:#0a0a0a;font-weight:600':'background:transparent;color:var(--muted)'}" onclick="ssgViewMode='densidad';buildZoomList()">Por densidad</button>
    </div>`;
    if(ssgViewMode==='ejercicio'){
      (D.ssgSpecs||[]).filter(s=>s).forEach((spec,i)=>{
        const m=spec.match(/(\d+)\s*vs\s*(\d+)/i)||spec.match(/(\d+)\s*x\s*(\d+)/i);
        const title=m?`${m[1]}v${m[2]}`:(spec.length>22?spec.slice(0,22)+'…':spec);
        const info=SSG_SPEC_DENSITY[spec];
        const sub=info?Math.round(info.m2j)+' m²/j · '+spec.slice(0,30)+(spec.length>30?'…':''):spec.slice(0,40);
        h+=`<div class="zoom-sb-item ${zIdx===i?'act':''}" onclick="selZoom(${i})"><div class="zoom-sb-title">${title}</div><div class="zoom-sb-sub">${sub}</div></div>`;
      });
    }else{
      [['SSG_D_LOW','Denso','< 100 m²/j'],['SSG_D_MID','Medio','100–150 m²/j'],['SSG_D_HIGH','Amplio','> 150 m²/j']].forEach(([cat,lbl,rng])=>{
        const key='dens::'+cat;
        const specs=(D.ssgSpecs||[]).filter(s=>s&&SSG_SPEC_DENSITY[s]?.cat===cat);
        const n=specs.reduce((s,sp)=>{
          return s+(D.ssgBPS||[]).filter(r=>r.ESPECIFICACION===sp).reduce((a,r)=>a+(r.N||0),0);
        },0);
        h+=`<div class="zoom-sb-item ${zIdx===key?'act':''}" onclick="selZoom('${key}')">
          <div class="zoom-sb-title">${lbl} · ${rng}</div>
          <div class="zoom-sb-sub">${specs.length} ejercicio${specs.length!==1?'s':''} · n=${n}</div>
        </div>`;
      });
    }
  }else if(zSec==='rondos'){
    (D.rondoS||[]).forEach((sess,i)=>{h+=`<div class="zoom-sb-item ${zIdx===i?'act':''}" onclick="selZoom(${i})"><div class="zoom-sb-title">Rondo ${sess.FECHA_KEY||''}</div><div class="zoom-sb-sub">${sess.VIDEO_ID?'📹 Video':'Sin video'}</div></div>`;});
  }else if(zSec==='velocidad'){
    [['VEL_ACEL','Aceleración'],['VEL_VMAX','Vmax'],['VEL_CDD','Cambio de dir.'],['VEL_ACC_VMAX','Acc + Vmax']].forEach(([cat,lbl])=>{
      h+=`<div class="sb-lbl" style="padding:10px 16px 4px">${lbl}</div>`;
      ((D.velS||{})[cat]?.sessions||[]).forEach((sess,i)=>{
        const key=cat+'::'+i;
        h+=`<div class="zoom-sb-item ${zIdx===key?'act':''}" onclick="selZoom('${cat}::${i}')"><div class="zoom-sb-title">${sess.FECHA_KEY||'—'}</div><div class="zoom-sb-sub">${sess.ESPECIFICACION||lbl}${sess.VIDEO_ID?' · 📹':''}</div></div>`;
      });
    });
  }
  el.innerHTML=h;
}
window.selZoom=function(idx){zIdx=idx;buildZoomList();renderZoomMain();};

function renderZoomMain(){
  if(zIdx===null)return;
  const el=document.getElementById('zoomMain');const mg=MG.find(g=>g.id===curMG);const cfg=CHART_CFG[curMG];
  const normLblZ=relOn?' · c/'+relMin+"'":'';
  let h=`<div class="ctrl-bar"><div class="ctrl-grp"><div class="ctrl-lbl">Puestos</div><div class="pcheck-wrap">${pCH('z')}</div></div></div>`;
  h+=`<div class="mg-tabs">${MG.map(g=>`<button class="mgtab ${g.id===curMG?'act':''}" onclick="curMG='${g.id}';renderZoomMain()">${g.label}</button>`).join('')}</div>`;

  let specRows=[],videoId=null,videoLabel='',title='',n=0;

  if(zSec==='ssg'){
    if(typeof zIdx==='string'&&zIdx.startsWith('dens::')){
      // Density group view
      const densCat=zIdx.split('::')[1];
      const densRows=DENSITY_ROWS[densCat]||{};
      specRows=Object.values(densRows);
      const lblMap={'SSG_D_LOW':'Denso (<100 m²/j)','SSG_D_MID':'Medio (100–150 m²/j)','SSG_D_HIGH':'Amplio (>150 m²/j)'};
      title=lblMap[densCat]||densCat;
      n=PUESTOS.reduce((s,p)=>s+((densRows[p]||{}).N||0),0);
      h+=`<div class="cat-hdr"><div class="cat-title">${title}</div><div class="cat-n">n = ${n}${normLblZ}</div></div>`;
      videoId=null;videoLabel='';
    }else{
      const spec=(D.ssgSpecs||[]).filter(s=>s)[zIdx];
      specRows=(D.ssgBPS||[]).filter(r=>r.ESPECIFICACION===spec);
      n=specRows.reduce((s,r)=>s+(r.N||0),0);
      const m=spec.match(/(\d+)\s*vs\s*(\d+)/i)||spec.match(/(\d+)\s*x\s*(\d+)/i);
      title=m?`SSG ${m[1]}v${m[2]}`:'SSG';
      const info=SSG_SPEC_DENSITY[spec];
      const densTag=info?` <span style="font-size:11px;color:var(--dim);font-family:'DM Sans',sans-serif;font-weight:400">${Math.round(info.m2j)} m²/j</span>`:'';
      h+=`<div class="cat-hdr"><div class="cat-title">${title}${densTag}</div><div class="cat-n">n = ${n}${normLblZ}</div></div>`;
      if(spec)h+=`<div class="spec-badge">📋 ${spec}</div>`;
      videoId=(D.ssgVids||{})[spec]||null;videoLabel=spec||'SSG';
    }
  }else if(zSec==='rondos'){
    const sess=(D.rondoS||[])[zIdx];
    specRows=(D.byPC||[]).filter(r=>r.CATEGORIA==='RONDO');
    title='Rondo';n=totN('RONDO');
    h+=`<div class="cat-hdr"><div class="cat-title">Rondo</div><div class="cat-n">${sess?.FECHA_KEY||''} · n = ${sess?.N||0}${normLblZ}</div></div>`;
    videoId=sess?.VIDEO_ID||null;videoLabel=`Rondo ${sess?.FECHA_KEY||''}`;
  }else if(zSec==='velocidad'){
    const[cat,idxS]=zIdx.split('::');const idx=parseInt(idxS);
    const sess=((D.velS||{})[cat]?.sessions||[])[idx];
    specRows=((D.velS||{})[cat]?.byPuesto||[]).filter(r=>r.FECHA_KEY===sess?.FECHA_KEY&&r.ESPECIFICACION===sess?.ESPECIFICACION);
    const lbls={'VEL_ACEL':'Aceleración','VEL_VMAX':'Vmax','VEL_CDD':'Cambio de dirección','VEL_ACC_VMAX':'Acc + Vmax'};
    title=lbls[cat]||cat;n=sess?.N||0;
    h+=`<div class="cat-hdr"><div class="cat-title">${title}</div><div class="cat-n">${sess?.FECHA_KEY||''} · n = ${n}</div></div>`;
    if(sess?.ESPECIFICACION)h+=`<div class="spec-badge">📋 ${sess.ESPECIFICACION}</div>`;
    videoId=sess?.VIDEO_ID||null;videoLabel=`${title} ${sess?.FECHA_KEY||''}`;
  }

  // Table — density mode uses precomputed DENSITY_ROWS directly
  const isDens=zSec==='ssg'&&typeof zIdx==='string'&&zIdx.startsWith('dens::');
  const densCatKey=isDens?zIdx.split('::')[1]:null;

  h+=`<table class="tbl"><thead><tr><th>Puesto</th>${mg.metrics.map(m=>`<th>${m.l}${m.u?' ('+m.u+')':''}</th>`).join('')}<th>n</th></tr></thead><tbody>`;
  ['TODOS',...PUESTOS].forEach(p=>{
    let row;
    if(isDens){
      row=(DENSITY_ROWS[densCatKey]||{})[p]||null;
    }else if(p==='TODOS'){
      const pr=specRows.filter(r=>PUESTOS.includes(r.PUESTO));
      if(pr.length){
        row={PUESTO:'TODOS',N:pr.reduce((s,r)=>s+(r.N||0),0),DURACION:pr.reduce((s,r)=>s+(r.DURACION||0),0)/pr.length};
        mg.metrics.forEach(m=>{const vs=pr.map(r=>r[m.k]).filter(v=>v!=null);row[m.k]=vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null;});
      }
    }else{
      row=specRows.find(r=>r.PUESTO===p);
    }
    const col=PC[p];
    h+=`<tr><td><span class="dot" style="background:${col}"></span>${p==='TODOS'?'Todos':p[0]+p.slice(1).toLowerCase()}</td>`;
    mg.metrics.forEach(m=>{h+=`<td>${fmt(gV(row,m))}</td>`;});
    h+=`<td>${row?row.N:'—'}</td></tr>`;
  });
  h+=`</tbody></table><div class="divider"></div>`;

  if(cfg){
    const lineArr=cfg.lines||(cfg.line?[cfg.line]:[]);
    const tlItem=cfg.stacks.find(s=>s.topLabel)?.topLabel;
    h+=`<div class="glegend">
      ${cfg.stacks.map(s=>`<span><span class="gleg-sq" style="background:${s.bc}"></span>${s.l}</span>`).join('')}
      ${tlItem?`<span><span class="gleg-sq" style="background:#888;font-size:9px">📊</span>${tlItem.l} (en barra)</span>`:''}
      ${lineArr.map(lr=>`<span><span class="gleg-line" style="background:${lr.bc}"></span>${lr.l}</span>`).join('')}
    </div>`;
  }
  h+=`<div style="position:relative;width:100%;height:240px"><canvas id="zoomChart" role="img" aria-label="Gráfico zoom"></canvas></div>`;

  el.innerHTML=h;setYT(videoId,videoLabel);
  const puestosRows=isDens
    ?PUESTOS.map(p=>(DENSITY_ROWS[densCatKey]||{})[p]||null)
    :PUESTOS.map(p=>specRows.find(r=>r.PUESTO===p));
  buildChart('zoomChart',PUESTOS,puestosRows,curMG);
}

// HEATMAP
function normToColor(norm){
  const stops=[[0,30,180],[30,120,50],[200,180,0],[210,90,0],[180,20,20]];
  const t=Math.max(0,Math.min(1,norm||0));
  const idx=t*(stops.length-1);const lo=Math.floor(idx);const hi=Math.min(lo+1,stops.length-1);const f=idx-lo;
  const r=Math.round(stops[lo][0]+(stops[hi][0]-stops[lo][0])*f);
  const g=Math.round(stops[lo][1]+(stops[hi][1]-stops[lo][1])*f);
  const b=Math.round(stops[lo][2]+(stops[hi][2]-stops[lo][2])*f);
  const lum=0.299*r+0.587*g+0.114*b;
  return{bg:`rgb(${r},${g},${b})`,text:lum>140?'#0a0a0a':'#ffffff'};
}

function renderHeatmap(){
  const el=document.getElementById('hmGrid');if(!el)return;
  const cats=D.heatCats||[];const MG_IDS=['dist','vel','acel','des'];
  const todosMap={};
  (D.byPC||[]).filter(r=>r.PUESTO==='TODOS').forEach(r=>todosMap[r.CATEGORIA]=r);

  const normLblH=relOn?' · c/'+relMin+"' por jugador":'· valores brutos';
  let h=`<div style="font-size:10px;color:var(--dim);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;">${normLblH}</div>`;
  h+=`<table class="hm-table"><thead><tr><th class="hm-th">Tarea</th>`;
  MG_IDS.forEach(mg=>{
    const opts=HM_METRICS[mg].map((m,i)=>`<option value="${i}" ${i===hmSel[mg]?'selected':''}>${m.l}</option>`).join('');
    h+=`<th class="hm-th-sel"><select onchange="hmSel['${mg}']=+this.value;renderHeatmap()">${opts}</select></th>`;
  });
  h+=`</tr></thead><tbody>`;

  cats.forEach(cat=>{
    const row=todosMap[cat]||{};
    h+=`<tr><td class="hm-cat-cell">${cL(cat)}</td>`;
    MG_IDS.forEach(mg=>{
      const selMet=HM_METRICS[mg][hmSel[mg]];
      const displayVal=gV(row,selMet);
      // Color scale uses the same processed values
      const allVals=cats.map(c=>gV(todosMap[c]||{},selMet)).filter(v=>v!=null);
      const mn=allVals.length?Math.min(...allVals):0;
      const mx=allVals.length?Math.max(...allVals):1;
      const norm=mx>mn?((displayVal||0)-mn)/(mx-mn):0.5;
      const {bg,text}=normToColor(norm);
      const pct=Math.round(norm*100);
      const tag=norm>0.8?'▲ máxima':norm<0.2?'▼ mínima':'';
      const valFmt=displayVal!=null?parseFloat(displayVal.toFixed(1)).toLocaleString('es-AR'):'—';
      h+=`<td style="padding:3px"><div class="hm-card" style="background:${bg};color:${text}">
        <div>
          <div class="hm-card-met">${selMet.l}</div>
          <div class="hm-card-val">${valFmt}<span class="hm-card-u">${selMet.u}</span></div>
        </div>
        <div>
          <div class="hm-card-bar-wrap"><div class="hm-card-bar" style="width:${pct}%;background:${text==='#0a0a0a'?'rgba(0,0,0,.3)':'rgba(255,255,255,.4)'}"></div></div>
          ${tag?`<div class="hm-card-tag">${tag}</div>`:''}
        </div>
      </div></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  el.innerHTML=h;
}

window.switchPage=function(p){
  curPage=p;

  document.querySelectorAll('.tbtn').forEach((el,i)=>el.classList.toggle('act',['analysis','zoom','heatmap'][i]===p));

  else{document.getElementById(p==='analysis'?'pageAnalysis':'pageZoom').classList.add('act');if(p==='zoom')buildZoomList();}
};
